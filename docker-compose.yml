services:
  postgres:
    image: postgres:16-alpine
    container_name: taskqueue-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: javali123
      POSTGRES_DB: task_queue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: taskqueue-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: taskqueue-backend
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:javali123@postgres:5432/task_queue_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
    volumes:
      - processed-images:/app/output

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    container_name: taskqueue-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.docker

  worker1:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: taskqueue-worker1
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:javali123@postgres:5432/task_queue_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
      WORKER_NAME: Worker-1
    volumes:
      - processed-images:/app/output

  worker2:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: taskqueue-worker2
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:javali123@postgres:5432/task_queue_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
      WORKER_NAME: Worker-2
    volumes:
      - processed-images:/app/output

  worker3:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: taskqueue-worker3
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:javali123@postgres:5432/task_queue_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
      WORKER_NAME: Worker-3
    volumes:
      - processed-images:/app/output

  dlq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker

    command: npm run start-dlq-worker

    restart: always

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:javali123@postgres:5432/task_queue_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
volumes:
  postgres-data:
  processed-images:
