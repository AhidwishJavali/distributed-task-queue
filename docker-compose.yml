version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskqueue-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: javali123
      POSTGRES_DB: task_queue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: taskqueue-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: taskqueue-backend
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: taskqueue-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"
    env_file:
      - ./frontend/.env.docker

volumes:
  postgres-data: